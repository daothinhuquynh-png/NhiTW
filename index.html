<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>StemCell BMS — Quản lý Ngân hàng Tế bào gốc</title>
    <link rel="stylesheet" href="css/app.css">
</head>
<body>
    <div class="app" id="app">
        <!-- Sidebar -->
        <aside class="sidebar" id="sidebar">
            <div class="sidebar-header">
                <div class="logo">
                    <span class="logo-icon">🧬</span>
                    <span class="logo-text">StemCell BMS</span>
                </div>
                <button class="sidebar-close" id="sidebarClose">✕</button>
            </div>
            <div class="sidebar-user">
                <div class="avatar">NT</div>
                <div class="user-info">
                    <div class="user-name">Nguyễn Thành</div>
                    <div class="user-role">Quản trị viên</div>
                </div>
            </div>
            <nav class="sidebar-nav">
                <a href="#" class="nav-item active" data-page="dashboard">
                    <span class="nav-icon">📊</span>
                    <span>Tổng quan</span>
                </a>
                <div class="nav-group-label">Quản lý mẫu</div>
                <a href="#" class="nav-item" data-page="contracts">
                    <span class="nav-icon">📋</span>
                    <span>Hợp đồng lưu mẫu</span>
                </a>
                <a href="#" class="nav-item" data-page="collection">
                    <span class="nav-icon">🔬</span>
                    <span>Thu thập & Vận chuyển</span>
                </a>
                <a href="#" class="nav-item" data-page="receiving">
                    <span class="nav-icon">📥</span>
                    <span>Tiếp nhận & Lưu mẫu</span>
                </a>
                <a href="#" class="nav-item" data-page="export">
                    <span class="nav-icon">📤</span>
                    <span>Xuất mẫu</span>
                </a>
                <div class="nav-group-label">Hệ thống</div>
                <a href="#" class="nav-item" data-page="crm">
                    <span class="nav-icon">💌</span>
                    <span>Quan hệ khách hàng</span>
                </a>
                <a href="#" class="nav-item" data-page="storage">
                    <span class="nav-icon">🗄️</span>
                    <span>Quản lý tủ lưu mẫu</span>
                </a>
            </nav>
        </aside>

        <!-- Main Content -->
        <main class="main">
            <!-- Top bar -->
            <header class="topbar">
                <div class="topbar-left">
                    <button class="menu-toggle" id="menuToggle">☰</button>
                    <div class="breadcrumb" id="breadcrumb">Tổng quan</div>
                </div>
                <div class="topbar-right">
                    <div class="search-box">
                        <input type="text" placeholder="Tìm kiếm mẫu, hợp đồng..." id="globalSearch">
                    </div>
                    <div class="topbar-actions">
                        <button class="icon-btn notification-btn" id="notifBtn">
                            🔔<span class="badge" id="notifBadge">3</span>
                        </button>
                    </div>
                </div>
            </header>

            <!-- Page content -->
            <div class="page-content" id="pageContent">
                <!-- Content rendered by JS -->
            </div>
        </main>
    </div>

    <!-- Modal container -->
    <div class="modal-overlay" id="modalOverlay">
        <div class="modal" id="modal">
            <div class="modal-header">
                <h3 id="modalTitle">Modal</h3>
                <button class="modal-close" id="modalClose">✕</button>
            </div>
            <div class="modal-body" id="modalBody"></div>
            <div class="modal-footer" id="modalFooter"></div>
        </div>
    </div>

    <!-- Toast -->
    <div class="toast-container" id="toastContainer"></div>

    <!-- Notification panel -->
    <div class="notif-panel" id="notifPanel">
        <div class="notif-header">
            <h3>Thong bao</h3>
            <button class="notif-close" id="notifClose">✕</button>
        </div>
        <div class="notif-list" id="notifList"></div>
    </div>

    <script src="js/app.js"></script>
</body>
</html>
